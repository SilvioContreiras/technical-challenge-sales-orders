name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  # Single required check for branch protection / rulesets.
  # Fails (and blocks PR merge) if quality failed for any reason, including tests.
  ci-gate:
    name: CI Gate
    needs: quality
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Block PR when CI quality job failed
        run: |
          result="${{ needs.quality.result }}"
          echo "quality job result: ${result}"
          if [ "${result}" != "success" ]; then
            echo "::error::CI Gate blocked: quality job did not succeed (${result}). Fix failing checks (including tests) before merging."
            exit 1
          fi
          echo "CI Gate passed."
